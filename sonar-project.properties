sonar.projectKey=volverjs_ui-vue
sonar.organization=volverjs
sonar.coverage.exclusions=src/test/**,src/stories/**,src/stories/**/*.*
sonar.exclusions=scripts/**

# S6440 (react-hooks/rules-of-hooks) is a false positive on this project:
# the rule mistakes Vue composables (useId, useStorage, useOptions, ...) for React Hooks.
#
# Web:S6819 / Web:S6842 are false positives on intentional WAI-ARIA authoring
# patterns (menu, separator, listbox group, custom combobox) where native
# elements cannot replace the explicit roles without breaking semantics/markup.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6440
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S6842
sonar.issue.ignore.multicriteria.e2.resourceKey=src/components/VvNav/VvNav.vue
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e3.resourceKey=src/components/VvNav/VvNavItem.vue
sonar.issue.ignore.multicriteria.e4.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e4.resourceKey=src/components/VvNav/VvNavSeparator.vue
sonar.issue.ignore.multicriteria.e5.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e5.resourceKey=src/components/VvDropdown/VvDropdownOptgroup.vue
sonar.issue.ignore.multicriteria.e6.ruleKey=Web:S6819
